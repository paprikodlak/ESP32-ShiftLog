; PlatformIO Configuration for ESP32-ShiftLog
; Target: Waveshare ESP32-S2-LCD-0.96 (ST7735S 160x80 px)

[env:esp32-s2]
platform  = espressif32
board     = esp32-s2-saola-1
framework = arduino

; Upload & serial monitor
monitor_speed = 115200
upload_speed  = 921600

; Build flags
; Enable USB CDC as Serial on boot for ESP32-S2.
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1

; Library dependencies
lib_deps =
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0
    adafruit/Adafruit GFX Library @ ^1.11.11
    mathertel/OneButton @ ^2.6.1

[env:m5stack-sticks3]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = arduino

; Board-specific build settings
board_build.arduino.partitions = default_8MB.csv
board_build.arduino.memory_type = qio_opi

; Upload & serial monitor
monitor_speed = 115200
upload_speed  = 921600

; Build flags (official M5Stack config)
build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=5
    ; Stage-1 bring-up: prefer USB-UART monitor stability for serial diagnostics.
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_M5STICKS3=1
    -DSHIFTLOG_BOOTSTRAP_STEP=0

; Library dependencies (shared with ESP32-S2 env)
lib_deps =
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0
    adafruit/Adafruit GFX Library @ ^1.11.11
    mathertel/OneButton @ ^2.6.1
    ; M5Unified=https://github.com/m5stack/M5Unified
    ; M5PM1=https://github.com/m5stack/M5PM1
