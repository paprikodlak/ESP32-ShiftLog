; PlatformIO Configuration for ESP32-ShiftLog
; Target: Waveshare ESP32-S2-LCD-0.96 (ST7735S 160x80 px)

[env:esp32-s2]
platform  = espressif32
board     = esp32-s2-saola-1
framework = arduino

; Upload & serial monitor
monitor_speed = 115200
upload_speed  = 921600

; LittleFS filesystem image
board_build.filesystem = littlefs
board_build.partitions = partitions_custom.csv

; Build flags
; ARDUINO_USB_MODE=0 and ARDUINO_USB_CDC_ON_BOOT=0 allow Adafruit TinyUSB to
; control the USB peripheral instead of the ROM CDC implementation.
;
; TFT_eSPI is configured entirely via compiler defines here so that the
; library's User_Setup.h is not required.
;   ST7735_GREENTAB160x80 selects the correct display tab/offset for 160x80.
;   TFT_WIDTH / TFT_HEIGHT are the portrait-mode physical dimensions.
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DUSER_SETUP_LOADED=1
    -DST7735_DRIVER=1
    -DTFT_WIDTH=80
    -DTFT_HEIGHT=160
    -DST7735_GREENTAB160x80=1
    -DTFT_CS=7
    -DTFT_DC=9
    -DTFT_RST=8
    -DTFT_BL=15
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=27000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1

; Library dependencies
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    tzapu/WiFiManager @ ^2.0.17
    bblanchon/ArduinoJson @ ^7.2.1
    adafruit/Adafruit TinyUSB Library @ ^3.4.2
    mathertel/OneButton @ ^2.6.1
